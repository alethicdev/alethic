name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test and Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alethic_kernel
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      # mypy resolves `-p alethic_kernel.*` via mypy_path="..", so the checkout
      # directory must be named after the package rather than the repo.
      - uses: actions/checkout@v4
        with:
          path: alethic_kernel

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run type checking (mypy)
        run: mypy --strict -p alethic_kernel.alethic -p alethic_kernel.llm -p alethic_kernel.agents -p alethic_kernel.eval -p alethic_kernel.tools
